<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SettleUp-Engine | Debt Algorithm</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="engine-container">
        <header>
            <h1>SettleUp Engine</h1>
            <p>Optimizing transactions via Greedy Algorithm</p>
        </header>

        <main>
            <section class="input-section">
                <div class="input-group">
                    <label>Add Expense</label>
                    <input type="text" id="payer" placeholder="Who paid? (e.g. Pranay)">
                    <input type="number" id="amount" placeholder="Amount (e.g. 500)">
                    <input type="text" id="participants" placeholder="For whom? (comma separated: Raj, Om, Amit)">
                    <button id="add-expense-btn">Add to List</button>
                </div>

                <div class="expense-list">
                    <h3>Current Expenses</h3>
                    <ul id="display-list">
                        </ul>
                </div>
            </section>

            <section class="action-section">
                <button id="calculate-btn">Calculate Best Settlement</button>
                <div id="settlement-results" class="results-box">
                    <p class="placeholder">Results will appear here...</p>
                </div>
            </section>
        </main>

        <footer>
            <a href="../index.html" class="back-link">← Back to Lab Hub</a>
        </footer>
    </div>

</body>
</html>
